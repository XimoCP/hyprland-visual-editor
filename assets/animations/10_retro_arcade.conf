# @Title: Retro Arcade
# @Icon: device-gamepad-2
# @Color: #f472b6
# @Tag: 80s
# @Desc: "Toon/Arcade" effect. Windows jump and bounce with exaggerated physics.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimized for HVE: Moved the "crazy" curve from
# movement (where it was distracting) to entry (where it's fun).
# -----------------------------------------------------

animations {
    enabled = true

    # --- ARCADE BEZIERS ---

    # "JUMP" (Former smoothIn): The crown jewel.
    # High anticipation and high bounce. Perfect for windows that "jump" in.
    bezier = jump, 0.5, -0.3, 0.68, 1.4

    # "SQUASH" (For closing):
    # Anticipation to gain momentum before vanishing.
    bezier = squash, 0.5, -0.5, 0.1, 1.0

    # "RUBBER" (For moving):
    # A more controlled bounce to make dragging smooth yet lively.
    bezier = rubber, 0.05, 0.9, 0.1, 1.05

    # --- WINDOWS (The Show) ---

    # IN: 'popin 80%' + 'jump'.
    # The window appears small, shrinks for a millisecond, and BOING! explodes onto the screen.
    # Speed 5 to appreciate the cartoonish feel.
    animation = windowsIn, 1, 5, jump, popin 80%

    # OUT: 'popin 80%' + 'squash'.
    # The window shrinks drastically (as if vacuumed) before leaving.
    animation = windowsOut, 1, 4, squash, popin 80%

    # MOVEMENT: Using 'rubber' (standard overshoot).
    # We want it to be fun but controllable.
    animation = windowsMove, 1, 4, rubber, slide

    # --- SYSTEM DEFAULTS ---

    # Fades: Fast and simple to keep focus on the main show.
    animation = fade, 1, 3