# -----------------------------------------------------
# Optimized for HVE: Reassigned high-impact curve
# to entry animations to avoid visual glitches on close.
# -----------------------------------------------------

animations {
    enabled = true

    # --- HIGH-OCTANE BEZIERS ---

    # "Nitro" (Original OutBack):
    # Overshoots up to 1.56. The most aggressive bounce in the collection.
    # Perfect for triumphant window entries.
    bezier = nitro, 0.34, 1.56, 0.64, 1

    # "Recoil" (The kickback):
    # Undershoots down to -0.56. The window visibly contracts before disappearing.
    # It feels like a weapon's recoil.
    bezier = recoil, 0.36, 0, 0.66, -0.56

    # "Crazy" (For movement):
    # A strong but controlled bounce to make dragging windows feel powerful.
    bezier = crazy, 0.05, 0.9, 0.1, 1.05

    # --- WINDOWS (Explosions) ---

    # IN: 'popin 80%' + 'nitro'.
    # The window appears, overscales slightly, and settles into place. BOOM!
    animation = windowsIn, 1, 6, nitro, popin 80%

    # OUT: 'popin 80%' + 'recoil'.
    # The window shrinks sharply and vanishes.
    animation = windowsOut, 1, 5, recoil, popin 80%

    # MOVEMENT: Heavy and powerful.
    animation = windowsMove, 1, 5, crazy, slide

    # --- FADES ---
    # Fast, we don't want to distract from the main action.
    animation = fade, 1, 3, default
    animation = layers, 1, 4, nitro, popin

    # --- WORKSPACES (Earthquake) ---
    # Using 'nitro' here as well.
    # Switching desktops shakes the screen with