# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# -----------------------------------------------------
# Optimized for HVE: Differentiated from "Inertia".
# Focus on variable rhythm and window "breathing".
# -----------------------------------------------------

animations {
    enabled = true

    # --- RHYTHM BEZIERS ---

    # "Pulse":
    # Rises fast (0.1), slows down (0.9), and has a tiny final micro-bounce (1.05).
    # Less exaggerated than "Arcade" but more alive than "Material".
    bezier = pulse, 0.1, 0.9, 0.1, 1.05

    # "Quick":
    # An aggressive curve for exits. No anticipation, just speed.
    bezier = quick, 0.2, 1, 0.2, 1

    # --- WINDOWS (Bio-Mechanics) ---

    # IN: 'slide' + 'pulse'.
    # The window slides in fast and settles with a small visual "sigh".
    # Speed 6: Allows time to feel the rhythm.
    animation = windowsIn, 1, 6, pulse, slide

    # OUT: 'slide' + 'quick'.
    # Unlike the smooth entry, the exit is decisive.
    # This creates the "Dynamic" contrast: Soft in / Fast out.
    animation = windowsOut, 1, 4, quick, slide

    # MOVEMENT: Fluid.
    animation = windowsMove, 1, 5, pulse, slide

    # --- FADES (Synchronized) ---
    # Speed 5: Not too slow, not too fast. Synchronized with movement.
    animation = fade, 1, 5, pulse

    # Layers: Enter with the same "pulse" as windows.
    animation = layers, 1, 5, pulse, popin

    # --- WORKSPACES (Scene) ---
    # HERE IS THE TRICK: 'slidefade 40%'.
    # When moving, the old desktop becomes almost transparent.
    # Gives a sense of depth and dynamism, like turning pages of air.
    animation = workspaces, 1, 6,