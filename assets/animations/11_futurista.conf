# @Title: Futuristic
# @Icon: cpu
# @Color: #22d3ee
# @Tag: TECH
# @Desc: Holographic interface. Digital precision, zero bounces, and vertical data flow.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimized for HVE: Elasticity removed.
# Now using exponential curves for "Robotic" precision.
# -----------------------------------------------------

animations {
    enabled = true

    # --- TECH BEZIERS ---

    # "Holo": Exponential Curve (Quint).
    # Shoots out and brakes sharply at the exact pixel.
    bezier = holo, 0.23, 1, 0.32, 1

    # "Data": Linear-Smoothed. For continuous information flows.
    bezier = data, 0.16, 1, 0.3, 1

    # --- WINDOWS (Projection) ---

    # IN: 'slide' from bottom.
    # The window "emerges" from the console.
    # Speed 5: Fast but visible.
    animation = windowsIn, 1, 5, holo, slide

    # OUT: 'popin 100%' + 'slide'.
    # No resizing, it simply slides and turns off.
    # Speed 4: Rapid disconnection.
    animation = windowsOut, 1, 4, holo, popin 100%

    # MOVEMENT: Surgical precision.
    # The window follows the mouse weightlessly, like a laser cursor.
    animation = windowsMove, 1, 5, holo, slide

    # --- FADES (Digital) ---
    animation = fade, 1, 5, data
    animation = layers, 1, 5, holo, fade

    # --- WORKSPACES (The Matrix Style) ---
    # HERE IS THE KEY: 'slidevert' (Vertical Slide).
    # Switching desktops feels like scrolling through a giant terminal.
    # Very "Cyberpunk".
    animation = workspaces, 1, 6, holo, slidevert

    # Special: Same here, total vertical consistency.
    animation = specialWorkspace, 1, 6, holo, slidevert
}