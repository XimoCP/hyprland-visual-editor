# @Title: Elastic Inertia
# @Icon: adjustments
# @Color: #60a5fa
# @Tag: PHYSICS
# @Desc: Organic movement. Windows gain momentum on exit and bounce on entry.

# -----------------------------------------------------
# в–„в–Җв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–ҲвҖғв–Ҳв–Җв–„в–Җв–ҲвҖғв–„в–Җв–ҲвҖғв–Җв–Ҳв–ҖвҖғв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–‘в–Ҳ
# в–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–Ҳ
#

animations {
    enabled = true

    # --- PHYSICS BEZIERS ---

    # 1. ANTICIPATION (For closing):
    # The curve drops to -0.1 (gains backward momentum) and then shoots to 1.
    bezier = anticipate, 0.1, -0.1, 0.1, 1.0

    # 2. INERTIA (For opening):
    # Arrives fast and overshoots slightly (1.05) to settle smoothly.
    bezier = inertia, 0.05, 0.9, 0.1, 1.05

    # 3. FRICTION (For moving):
    # Starts fast, ends very smoothly.
    bezier = friction, 0.05, 0.9, 0.1, 1.0

    # --- ANIMATIONS ---

    # ENTRY: Pure inertia.
    # Using 'slide' so it enters from bottom/side like a physical card.
    animation = windowsIn, 1, 5, inertia, slide

    # EXIT: Anticipation.
    # Notice the effect: the window recedes a millimeter before flying away.
    # Speed set to 6 to allow time to appreciate that "momentum" gain.
    animation = windowsOut, 1, 6, anticipate, slide

    # MOVEMENT: Friction.
    # No weird bounces, just smoothness when dragging.
    animation = windowsMove, 1, 5, friction, slide

    # LAYERS AND FADES: Synchronized.
    # Speed adjusted to 5. Now opacity matches the movement speed.
    animation = fade, 1, 5, friction
    animation = layers, 1, 5, friction, fade

    # WORKSPACES:
    # 'slidefade 20%' provides a very modern 3D depth sensation.
    animation = workspaces, 1, 6, inertia, slidefade 20%
}