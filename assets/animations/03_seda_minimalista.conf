# @Title: Minimalist Silk
# @Icon: circle-dot
# @Color: #818cf8
# @Tag: SOFT
# @Desc: Absolute smoothness. No bounces, just perfect macOS-style landings.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

animations {
    enabled = yes

    # --- BEZIERS (PURE MATHEMATICS) ---
    # Quartic Out: The curve of elegance. Brakes very smoothly.
    bezier = quart, 0.25, 1, 0.5, 1

    # Expo Out: For workspaces, we want the finish to be even softer.
    bezier = expo, 0.16, 1, 0.3, 1

    # --- WINDOWS (The Popin Shift) ---
    # IN: 'popin 80%'. The window originates from the center (at 80% scale) and grows.
    # Much more elegant than watching it fly in from the side of the screen.
    animation = windowsIn, 1, 6, quart, popin 80%

    # OUT: Slightly faster (Speed 5) to stay out of the way.
    animation = windowsOut, 1, 5, quart, popin 80%

    # MOVEMENT: Using 'quart' to give the window perceived weight when dragging.
    animation = windowsMove, 1, 6, quart, slide

    # --- LAYERS ---
    # Menus fade in/out smoothly.
    animation = fade, 1, 6, quart

    # --- WORKSPACES ---
    # HERE IS THE TRICK: 'slidefade 20%'
    # Instead of just sliding, the old desktop darkens slightly and recedes.
    # Creates a very subtle 3D depth sensation.
    animation = workspaces, 1, 6, expo, slidefade 20%
}