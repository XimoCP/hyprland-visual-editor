# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# -----------------------------------------------------
# Optimized for HVE: Speed increased to avoid any "lag" sensation.
# -----------------------------------------------------

animations {
    enabled = true

    # --- STANDARD LINEAR BEZIER ---
    # Correct mathematical definition of a 0 to 1 line.
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # --- WINDOWS (Machine Style) ---
    # Speed 5: Fast enough so the final "hit" isn't jarring.
    # Using pure 'slide'. No scales or weird transparencies.
    animation = windowsIn, 1, 5, linear, slide
    animation = windowsOut, 1, 5, linear, slide

    # Movement: Here linearity feels very "raw".
    # The window follows the mouse exactly, with no perceived weight.
    animation = windowsMove, 1, 5, linear, slide

    # --- FADES AND LAYERS ---
    # Linear fades must be fast.
    animation = fade, 1, 4, linear
    animation = layers, 1, 4, linear, fade

    # --- WORKSPACES ---
    # Simple slide. Like switching slides on an old projector.
    # Dry, fast, and functional.
    animation = workspaces, 1, 5, linear, slide
}