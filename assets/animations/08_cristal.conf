# @Title: Glass
# @Icon: droplet
# @Color: #38bdf8
# @Tag: VIBE
# @Desc: Ethereal sliding. The feeling of glass floating without friction.

# -----------------------------------------------------
# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# -----------------------------------------------------
# Optimized for HVE: Elastic bounces removed.
# Focus on "Glass" smoothness and transparencies.
# -----------------------------------------------------

animations {
    enabled = yes

    # --- CRYSTALLINE BEZIERS ---

    # "Glass": A smooth exponential curve.
    # Starts fast and brakes with extreme softness at the end (no bounce).
    bezier = glass, 0.16, 1, 0.3, 1

    # "Fade": Linear but smoothed for opacities.
    bezier = fade, 0.33, 1, 0.68, 1

    # --- WINDOWS ---

    # IN: Using 'slide' with the 'glass' curve.
    # The window slides in as if it were on ice/glass.
    # Speed 6: Slow and elegant.
    animation = windowsIn, 1, 6, glass, slide

    # OUT: Here we apply the "ethereal touch".
    # Using 'popin 90%'. The window moves away slightly while vanishing.
    animation = windowsOut, 1, 6, glass, popin 90%

    # MOVEMENT: Absolutely fluid.
    animation = windowsMove, 1, 6, glass, slide

    # --- FADES (The Protagonists) ---
    # For a "Glass" effect, fades must be noticeable.
    # Speed 7: Elements take a moment to become solid.
    animation = fade, 1, 7, fade
    animation = layers, 1, 6, glass, fade

    # --- WORKSPACES ---
    # 'slidefade 10%' is key here.
    # The movement is subtle and transparent, not aggressive.
    animation = workspaces, 1, 6, glass, slidefade 10%
}