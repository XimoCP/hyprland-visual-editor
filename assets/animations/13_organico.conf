# -----------------------------------------------------
# @Title: Organic
# @Icon: leaf
# @Color: #a3e635
# @Tag: NATURE
# @Desc: "Sprout" movement. Smooth vertical growth and slow fades.
# -----------------------------------------------------

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# >>> Optimized for HVE: Redundancy cleanup and plant-like physics. <<<

animations {
    enabled = yes

    # --- NATURAL BEZIERS ---

    # "Sprout":
    # Starts slow, rises and settles with extreme smoothness.
    # No aggressive bounce; it's like a leaf swaying in the wind.
    bezier = sprout, 0.25, 0.8, 0.25, 1.0

    # "Wind":
    # A slight overshoot (1.05) for moving windows,
    # so they don't feel like stones, but something light.
    bezier = wind, 0.05, 0.9, 0.1, 1.05

    # --- WINDOWS (Photosynthesis) ---

    # IN: 'popin 85%'.
    # The window "sprouts" almost at full size.
    # Speed 6: Slow and relaxing.
    animation = windowsIn, 1, 6, sprout, popin 85%

    # OUT: 'popin 95%'.
    # Barely shrinks. It simply evaporates like morning dew.
    animation = windowsOut, 1, 5, sprout, popin 95%

    # MOVEMENT: Using 'wind' so it feels light when dragging.
    animation = windowsMove, 1, 5, wind, slide

    # --- FADES (Mist) ---
    # Speed 7: Very slow and dreamlike transparencies.
    animation = fade, 1, 7, sprout

    # Layers: Enter smoothly by growing.
    animation = layers, 1, 5, sprout, popin

    # --- WORKSPACES (Vine) ---
    # Maintaining your 'slidevert'.
    # Moving between desktops feels like climbing up a vine