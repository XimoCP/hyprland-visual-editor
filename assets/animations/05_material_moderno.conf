# @Title: Modern Material
# @Icon: layers-intersect
# @Color: #c084fc
# @Tag: MODERN
# @Desc: Google Pixel aesthetics. Organic animations, subtle scales, and tactile response.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

animations {
    enabled = true

    # --- BEZIERS (Android Official Curves) ---
    # Decel: For incoming elements (brakes upon arrival)
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    # Accel: For outgoing elements (accelerates when leaving)
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    # Standard: For on-screen movements
    bezier = md3_standard, 0.2, 0, 0, 1

    # --- WINDOWS (Subtle Scale) ---
    # Entry: 'popin 80%'. Less travel, more elegance.
    # Speed 4: Slightly smoother than standard to appreciate the curve.
    animation = windowsIn, 1, 4, md3_decel, popin 80%

    # Exit: 'popin 80%'. Shrinks slightly as it disappears.
    # Speed 3: Fast, we don't want to wait for it to close.
    animation = windowsOut, 1, 3, md3_accel, popin 80%

    # Movement: [CRITICAL] Explicitly defined as 'slide'.
    # Using 'md3_standard' so it feels attached to the mouse but with weight.
    animation = windowsMove, 1, 3, md3_standard, slide

    # --- LAYERS AND MENUS (Consistency) ---
    animation = fade, 1, 3, md3_decel

    # Layers: If it slides in, it slides out.
    animation = layersIn, 1, 3, md3_decel, slide
    animation = layersOut, 1, 3, md3_accel, slide
    animation = fadeLayersIn, 1, 2, md3_decel
    animation = fadeLayersOut, 1, 2, md3_accel

    # --- WORKSPACES (Depth) ---
    # Using 'slidefade 20%' to simulate Android gesture navigation.
    # The previous desktop fades slightly as it leaves.
    animation = workspaces, 1, 5, md3_decel, slidefade 20%

    # Special: Vertical slide (like the app drawer).
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}