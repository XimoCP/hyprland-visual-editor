# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# -----------------------------------------------------
# Optimized for HVE: Converted from "Fast Elevator"
# to "Real Physical Spring".
# -----------------------------------------------------

animations {
    enabled = true

    # --- PHYSICS BEZIERS ---

    # "Spring":
    # Rises fast, overshoots to 1.1 (10% extra) and settles back.
    bezier = spring, 0.05, 0.9, 0.1, 1.1

    # "Crouch":
    # Before jumping (closing), it shrinks slightly downwards (-0.1).
    bezier = crouch, 0.1, -0.1, 0.1, 1.0

    # --- WINDOWS (Gravity Effect) ---

    # IN: 'popin 80%' + 'spring'.
    # The window drops (or grows) and BOING, it bounces upon arrival.
    # Speed 5: Time is needed to appreciate the bounce.
    animation = windowsIn, 1, 5, spring, popin 80%

    # OUT: 'popin 80%' + 'crouch'.
    # The window makes a downward "taking momentum" gesture and vanishes.
    animation = windowsOut, 1, 5, crouch, popin 80%

    # MOVEMENT: Fluid but with an elastic touch.
    animation = windowsMove, 1, 5, spring, slide

    # --- FADES ---
    animation = fade, 1, 3, default
    animation = fadeLayersIn, 1, 3, default
    animation = layers, 1, 4, spring, popin

    # --- WORKSPACES (The Pogo Stick) ---
    # Maintaining your original verticality idea ('slidevert').
    # When switching desktops, the entire screen slides up/down and bounces.
    # It's a very playful effect.
    animation = workspaces, 1, 5, spring, slidevert
}