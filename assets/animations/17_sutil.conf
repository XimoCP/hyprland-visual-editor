# -----------------------------------------------------
# Optimized for HVE: All bounce physics removed.
# Tuned for maximum concentration and zero eye fatigue.
# -----------------------------------------------------

animations {
    enabled = true

    # --- PROFESSIONAL BEZIERS ---

    # "Soft": A smooth Quartic curve.
    # Starts with purpose and brakes with absolute elegance.
    bezier = soft, 0.25, 1, 0.5, 1

    # "Focus": Linear-Smoothed.
    # For movements that need to be fast but not jarring.
    bezier = focus, 0.16, 1, 0.3, 1

    # --- WINDOWS (Focus Mode) ---

    # IN: 'popin 95%' + 'soft'.
    # The window appears almost in place. It doesn't travel across the screen.
    # Speed 5: Fast enough to avoid waiting, slow enough to stay calm.
    animation = windowsIn, 1, 5, soft, popin 95%

    # OUT: 'popin 98%' + 'focus'.
    # Almost a pure fade, with micro-scaling.
    # Speed 4: Quick disappearance.
    animation = windowsOut, 1, 4, focus, popin 98%

    # MOVEMENT: Solid.
    # The window feels heavy and stable, it doesn't float.
    animation = windowsMove, 1, 5, soft, slide

    # --- LAYERS AND