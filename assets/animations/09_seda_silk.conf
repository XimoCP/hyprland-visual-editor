# @Title: Silk
# @Icon: feather
# @Color: #4ade80
# @Tag: HYBRID
# @Desc: Refined JaKooLit style. Energetic entries, fleeting exits, and stable workspaces.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# -----------------------------------------------------
# Optimized for HVE: Workspace bounce has been 
# smoothed out to prevent Motion Sickness.
# -----------------------------------------------------

animations {
    enabled = yes

    # --- BEZIERS (JaKooLit's Signature) ---

    # "Overshot": The perfect standard bounce.
    # Rises fast, overshoots by 5%, and settles back. Feels organic.
    bezier = overshot, 0.05, 0.9, 0.1, 1.05

    # "SmoothOut": A smooth curve for fast exits.
    # Starts soft, accelerates, and ends soft. No jitters.
    bezier = smoothOut, 0.3, 0, 0.3, 1

    # "Crazy": (Optional) Maintains that aggressive entry from the original.
    # Used only for window entries, NOT for workspaces.
    bezier = crazy, 0.1, 1.1, 0.1, 1.1

    # --- WINDOWS (Controlled Energy) ---

    # IN: Using 'overshot' (or 'crazy' for more bounce).
    # 'popin 80%' + 'slide' creates that effect of the window lunging towards you.
    # Speed 6: Noticeable fluidity.
    animation = windowsIn, 1, 6, overshot, slide

    # OUT: Fast (Speed 4).
    # The window leaves smoothly without being intrusive using the smoothOut curve.
    animation = windowsOut, 1, 4, smoothOut, slide

    # MOVEMENT: Fluid and connected to the mouse.
    animation = windowsMove, 1, 5, overshot, slide

    # --- LAYERS AND FADES ---
    animation = fade, 1, 5, smoothOut
    animation = layers, 1, 5, overshot, slide

    # --- WORKSPACES (The Improvement) ---
    # Instead of using wild curves, we use standard 'overshot'.
    # Desktop switching has a small "settle" at the end,
    # but the screen no longer feels like jelly.
    animation = workspaces, 1, 6, overshot, slide
}