# @Title: Ghost Fade
# @Icon: cloud
# @Color: #cbd5e1
# @Tag: GHOST
# @Desc: Spectral materialization. Windows appear smoothly with almost no movement.

# -----------------------------------------------------
# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# -----------------------------------------------------
# Optimized for HVE: Physical bounces removed.
# Total focus on opacity and subtle scaling (The Ghost Effect).
# -----------------------------------------------------

animations {
    enabled = yes

    # --- SPECTRAL BEZIERS ---

    # "Phantom": A pure Sine curve.
    # No sudden acceleration or braking. It's like breathing.
    bezier = phantom, 0.4, 0, 0.6, 1

    # "Mist":
    # For movement. A bit more friction so it doesn't slide too much.
    bezier = mist, 0.2, 0.8, 0.2, 1

    # --- WINDOWS (Appearances) ---

    # IN: 'popin 90%' + 'phantom'.
    # The window appears almost at its final size, only growing 10% while becoming opaque.
    # Speed 7: Slow. We want to see the transition.
    animation = windowsIn, 1, 7, phantom, popin 90%

    # OUT: 'popin 95%' + 'phantom'.
    # Barely moves when closing. It simply ceases to be there.
    animation = windowsOut, 1, 6, phantom, popin 95%

    # MOVEMENT: Soft and silent.
    animation = windowsMove, 1, 6, mist, slide

    # --- FADES (The Core) ---
    # Speed 8: Transparencies are very noticeable.
    animation = fade, 1, 8, phantom

    # Layers: Menus appear floating.
    animation = layers, 1, 6, phantom, popin

    # --- WORKSPACES (Teleportation) ---
    # Forget 'slidevert'. A ghost walks through walls.
    # Using pure 'fade' or 'slidefade' with very little movement.
    # This makes the old desktop dissolve into the new one.
    animation = workspaces, 1, 8, phantom, fade
}