# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# -----------------------------------------------------
# Optimized for HVE: Real bounce physics injected 
# (15% Overshoot) to justify the "Elastic" name.
# -----------------------------------------------------

animations {
    enabled = yes

    # --- ELASTIC BEZIERS ---

    # "Rubber":
    # Rises very fast and overshoots considerably (1.15) to create visual vibration.
    bezier = rubber, 0.05, 0.9, 0.1, 1.15

    # "Snap":
    # For closing windows. An inverse curve that starts slow and accelerates massively at the end.
    # Like releasing a stretched rubber band.
    bezier = snap, 0.1, 1, 0, 1

    # --- WINDOWS (Bungee Jumping) ---

    # IN: 'slidevert' + 'rubber'.
    # The window enters from bottom/top and bounces upon reaching its position.
    # Speed 5: Perfect to appreciate the effect.
    animation = windowsIn, 1, 5, rubber, slidevert

    # OUT: 'slidevert' + 'snap'.
    # The window shoots out towards the vertical edge.
    # Speed 4: Quick and sharp.
    animation = windowsOut, 1, 4, snap, slidevert

    # MOVEMENT: Slightly smoothed here (lower overshoot) to avoid dizziness.
    animation = windowsMove, 1, 5, rubber, slide

    # --- FADES (Fast) ---
    # Elasticity implies kinetic energy, not slowness.
    animation = fade, 1, 4, default

    # Layers: Menus also bounce vertically.