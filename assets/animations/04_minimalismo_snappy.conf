# @Title: Snappy Minimalism
# @Icon: bolt
# @Color: #94a3b8
# @Tag: SNAPPY
# @Desc: Optimized for maximum speed. Focused strictly on window and workspace management.

# -----------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

animations {
    enabled = true

    # Specific movement Beziers
    bezier = winIn, 0.07, 0.88, 0.04, 0.99
    bezier = menu_decel, 0.05, 0.82, 0, 1
    bezier = menu_accel, 0.38, 0, 1, 1       # <--- ADDED! The missing piece
    bezier = md3_decel, 0.05, 0.8, 0.1, 0.97
    bezier = easeOutCirc, 0, 0.48, 0.38, 1

    # Window Animations
    animation = windowsIn, 1, 3.2, winIn, slide
    animation = windowsOut, 1, 2.8, easeOutCirc, slide # Added 'slide' to prevent flickering
    animation = windowsMove, 1, 3.0, md3_decel, slide

    # Fades and Layers
    animation = fade, 1, 1.8, md3_decel
    animation = layersIn, 1, 1.8, menu_decel, slide
    animation = layersOut, 1, 1.5, menu_accel, slide # menu_accel is now active

    # Workspaces
    animation = workspaces, 1, 4.0, menu_decel, slidefade 20%
    animation = specialWorkspace, 1, 2.3, md3_decel, slidefadevert 15%
}