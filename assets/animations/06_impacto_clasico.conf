# @Title: Classic Impact
# @Icon: flame
# @Color: #fb7185
# @Tag: FX
# @Desc: "Jelly" effect. Elastic bounce on entry and anticipation on exit.

# -----------------------------------------------------
# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

animations {
    enabled = true

    # --- CHARACTER BEZIERS ---

    # 1. ELASTIC (Entry): Rises fast and bounces at the end (Overshoot).
    bezier = elastic, 0.05, 0.9, 0.1, 1.05

    # 2. RETRO (Exit): Pulls back (BackIn) and accelerates.
    # This makes the window look like it "shrinks" before vanishing.
    bezier = retro, 0.6, -0.28, 0.735, 0.045

    # 3. SMOOTH (Movement): For dragging windows without feeling like jelly.
    bezier = smooth, 0.1, 1, 0.1, 1

    # --- WINDOWS ---

    # IN: Speed 6. 'popin 80%' combined with 'elastic' creates the bounce effect.
    animation = windowsIn, 1, 6, elastic, popin 80%

    # OUT: Speed 5 (Slightly faster).
    # The 'retro' curve makes it suck inwards before leaving.
    animation = windowsOut, 1, 5, retro, popin 80%

    # MOVEMENT: Using 'slide' and a smooth curve.
    # If we used 'elastic' here, the window would vibrate when released, which causes dizziness.
    animation = windowsMove, 1, 5, smooth, slide

    # --- SYSTEM DEFAULTS ---

    # Standard fades
    animation = fade, 1, 5, smooth

    # Workspaces: We give them the same 'elastic' bounce so the whole system
    # feels playful and consistent.
    animation = workspaces, 1, 6, elastic, slide

    # Special: Vertical slide with bounce.
    animation = specialWorkspace, 1, 6, elastic, slidevert
}