# -----------------------------------------------------
# PRESET: 10_GOLDEN_LUXURY (HARDCODED GOLD)
# -----------------------------------------------------

general {
    # REAL GOLD PALETTE:
    # 0xffC5A000 = Dark Gold (Base)
    # 0xffFFD700 = Pure Gold (Mid shine)
    # 0xffFFFFFF = White (Specular Reflection)

    # The sequence creates a very rich metallic gradient:
    col.active_border = 0xffC5A000 0xffFFD700 0xffFFFFFF 0xffFFD700 0xffC5A000 45deg

    # Inactive: Subtle dark gray to make the gold stand out when active
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # "Shimmer": Smooth curve for an elegant reflection movement.
    bezier = shimmer, 0.45, 0, 0.55, 1

    # Speed 60: Slow and heavy movement, like precious metal.
    animation = borderangle, 1, 60, shimmer, loop
}