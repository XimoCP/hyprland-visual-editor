# @Title: Neon Cyber-Glow (Dual)
# @Icon: bolt
# @Color: #00fff7
# @Tag: GLOW
# @Desc: Two-tone glow simulation using a white/violet light base.

# -----------------------------------------------------
# Optimized for HVE
# -----------------------------------------------------

general {
    border_size = 2
    # The border remains two-tone (Cyan and Magenta)
    col.active_border = rgba(00fff7ff) rgba(1a0026ff) rgba(ff00ffff) 45deg
    col.inactive_border = rgba(0f0f2655)
}

decoration {
    shadow {
        enabled = true
        range = 20              # Increased range for a larger aura
        render_power = 4        # More power for a denser glow

        # --- THE TRICK ---
        # We use a "bridge" color. A very transparent bluish white (44)
        # acts as a focus behind the border. As the cyan and pink rotate
        # over this white, it looks as if both are emitting their own light.
        color = rgba(ffffff44)

        offset = 0 0
    }
}

animations {
    enabled = yes
    bezier = nv_neon_flow, 0.4, 0, 0.2, 1
    animation = borderangle, 1, 30, nv_neon_flow, loop
}