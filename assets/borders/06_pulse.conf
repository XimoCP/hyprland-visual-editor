# -----------------------------------------------------
# PRESET: 06_HEARTBEAT (EKG STYLE)
# -----------------------------------------------------
general {
    # Maintaining the visual trick: lots of empty space and little color.
    # This creates the "energy ball" that rotates.
    col.active_border = $primary $surface $surface $surface 45deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # --- THE MAGIC CURVE ---
    # bezier = name, x1, y1, x2, y2
    #
    # 0.05, 0.9 -> At 5% of the time, it has already completed 90% of the rotation.
    # 0.1, 1.0  -> At 10% of the time, it has finished the rotation (100%).
    # Rest of the time -> It stays flat at 1.0 (still) until the loop restarts.
    bezier = heartbeat, 0.05, 0.9, 0.1, 1.0

    # Animation:
    # Speed 40: We set a long total time (approx 4 seconds).
    # Thanks to the curve, the rotation lasts 0.4s and the pause lasts 3.6s.
    # loop: Repe