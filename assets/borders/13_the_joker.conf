# @Title: the_joker
# @Icon: mood-suprised
# @Color: #39ff14
# @Tag: THEME
# @Desc: Joker Aesthetic: Acid green and deep purple with electric glow.

# -----------------------------------------------------
# Optimized for HVE
# -----------------------------------------------------

general {
    border_size = 2

    # --- Joker's Chaos ---
    # Combining Neon Green (39ff14) with Electric Purple (9d00ff).
    # The dark middle color (1a0026) is vital to make the lights look separated.
    col.active_border = rgba(39ff14ff) rgba(1a0026ff) rgba(9d00ffff) 45deg

    # Inactive: Very dark and subtle purple
    col.inactive_border = rgba(1a002655)
}

decoration {
    # --- Gotham Glow ---
    shadow {
        enabled = true
        range = 18              # Wider aura for the Joker effect
        render_power = 3

        # Using intense purple for the shadow.
        # Rotating the green over this purple background creates a vibrant optical effect.
        color = rgba(9d00ff55)

        offset = 0 0
    }
}

animations {
    enabled = yes

    # Constant flow curve
    bezier = nv_joker_flow, 0.4, 0, 0.2, 1

    # Speed 30: Constant rotation to maintain dynamism
    animation = borderangle, 1, 30, nv_joker_flow, loop
}

