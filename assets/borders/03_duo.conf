# -----------------------------------------------------
# PRESET: 03_DUO_CONTRAST (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # Combining Purple ($primary) with Peach ($secondary)
    # The 90-degree angle creates a perfect vertical split
    col.active_border = $primary $secondary 90deg

    # Subtle inactive border
    col.inactive_border = $surface_lowest
}

# No rotation to keep the color hierarchy fixed
animation = borderangle, 0