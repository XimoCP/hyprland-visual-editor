# -----------------------------------------------------
# PRESET: 01_CASCADE (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # 180deg = Vertical (Top to Bottom)
    # Repeating $primary to force a solid color down to the bottom
    col.active_border = $primary $surface 90deg
    col.inactive_border = $surface_lowest
}
# The angle animation MUST be disabled so the cascade
# doesn't spin like a washing machine.
animation = borderangle, 0