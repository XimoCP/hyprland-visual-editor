# -----------------------------------------------------
# PRESET: 09_CYBER_GLITCH (DYNAMIC VERSION)
# -----------------------------------------------------

general {
    # The Glitch Trick: Inserting the background color ($surface) between bright colors.
    # When rotating fast, it creates a "dead pixels" or flickering effect.
    col.active_border = $error $surface $primary $surface 90deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # 'rapid' curve: Jumps almost instantly, removing any smoothness.
    bezier = rapid, 0, 1, 0, 1

    # Speed: 15 (Frantic).
    # On high-end hardware, this looks sharp and electric with no motion blur.
    animation = borderangle, 1,